<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CHEFFY</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <section class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-brand">
          <i class="fa-solid fa-kitchen-set"></i>
          <div>
            <h1>CHEFFY</h1>
            <p>Your Kitchen Helper</p>
          </div>
        </div>
        <h2>Welcome Back</h2>
        <p>Access premium kitchen essentials and continue your shopping experience.</p>
      </div>

      <div class="social-login">
        <button class="social-btn google" type="button">
          <i class="fa-brands fa-google"></i>
          <span>Continue with Google</span>
        </button>
        <button class="social-btn facebook" type="button">
          <i class="fa-brands fa-facebook-f"></i>
          <span>Continue with Facebook</span>
        </button>
        <button class="social-btn apple" type="button">
          <i class="fa-brands fa-apple"></i>
          <span>Continue with Apple</span>
        </button>
      </div>

      <div class="divider"><span>or login with email</span></div>

      <form class="login-form" onsubmit="handleLogin(event)">
        <input id="loginEmail" type="email" placeholder="Email address" required>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <p class="login-footer">Don't have an account? <a href="index.html">Return home</a></p>
    </div>
  </section>
  <script src="script.js" defer></script>
</body>
</html>
