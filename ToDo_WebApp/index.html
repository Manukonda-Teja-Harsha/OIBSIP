<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - To-Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <span class="logo-icon">✓</span>
                <span class="logo-text">TaskFlow</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <button class="nav-item active" onclick="filterTasks(this,'all')">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </button>
            <button class="nav-item" onclick="filterTasks(this,'pending')">
                <span class="nav-icon">⏳</span>
                <span class="nav-text">Pending</span>
            </button>
            <button class="nav-item" onclick="filterTasks(this,'completed')">
                <span class="nav-icon">✅</span>
                <span class="nav-text">Completed</span>
            </button>
        </nav>

        <div class="sidebar-stats">
            <div class="stat-item">
                <span class="stat-value" id="totalTasksStat">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="completedTasksStat">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="pendingTasksStat">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>Tasks</h1>
                <p id="dateDisplay"></p>
            </div>
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="Search tasks..." class="search-box">
            </div>
        </header>

        <section class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-card-icon completed">📈</div>
                <div class="stat-card-content">
                    <span class="stat-card-value" id="completionPercent">0%</span>
                    <span class="stat-card-label">Complete</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon pending">⚡</div>
                <div class="stat-card-content">
                    <span class="stat-card-value" id="pendingCountCard">0</span>
                    <span class="stat-card-label">Pending</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon todo">📋</div>
                <div class="stat-card-content">
                    <span class="stat-card-value" id="totalCountCard">0</span>
                    <span class="stat-card-label">Total</span>
                </div>
            </div>
        </section>

        <section class="add-task-section">
            <div class="add-task-container">
                <input type="text" id="taskInput" placeholder="Add a new task..." class="task-input-modern" autocomplete="off">
                <button class="btn-add-modern" onclick="addTask()">+</button>
            </div>
        </section>

        <div class="tasks-grid">
            <section class="task-section" id="pendingSection">
                <div class="section-header">
                    <h2><span class="section-icon">⏳</span> Pending</h2>
                    <span class="section-badge" id="pendingBadge">0</span>
                </div>
                <ul class="task-list" id="pendingList"></ul>
            </section>

            <section class="task-section completed-section" id="completedSection">
                <div class="section-header">
                    <h2><span class="section-icon">✅</span> Completed</h2>
                    <span class="section-badge" id="completedBadge">0</span>
                </div>
                <ul class="task-list" id="completedList"></ul>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
